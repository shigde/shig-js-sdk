<div #fullscreenContainer class="stream-layout-editor">

  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">

      <div class="nav-group">
        <div class="nav-group-area">
          <div class="dropdown-center stream-overlay-dropdown">
            <button
              class="btn btn-sm btn-outline-primary dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown">

              Layout

            </button>

            <ul class="dropdown-menu">
              <li>
                <button class="dropdown-item" type="button" (click)="resetTileLayout()">
                  Tile Grid
                </button>
              </li>
            </ul>
          </div>

          <div class="dropdown-center">
            <button
              class="btn btn-sm btn-outline-primary dropdown-toggle"
              type="button"
              data-bs-toggle="dropdown">

              Overlay

            </button>

            <div class="dropdown-menu stream-overlay-menu">
              <button
                class="dropdown-item stream-overlay-toggle"
                type="button"
                [class.active]="nameOverlayEnabled"
                (click)="toggleNameOverlay()">
                <i
                  class="bi"
                  [class.bi-check-square-fill]="nameOverlayEnabled"
                  [class.bi-square]="!nameOverlayEnabled">
                </i>
                <span>Name-Overlay</span>
              </button>

              <div class="dropdown-divider"></div>

              <div class="stream-overlay-size">
                <button
                  class="btn btn-sm"
                  type="button"
                  [class.btn-primary]="nameOverlaySize === 'A'"
                  [class.btn-outline-primary]="nameOverlaySize !== 'A'"
                  (click)="setNameOverlaySize('A')">
                  Small
                </button>
                <button
                  class="btn btn-sm"
                  type="button"
                  [class.btn-primary]="nameOverlaySize === 'B'"
                  [class.btn-outline-primary]="nameOverlaySize !== 'B'"
                  (click)="setNameOverlaySize('B')">
                  Large
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button
        class="btn btn-sm btn-outline-primary"
        [class.active]="layoutEditMode"
        (click)="toggleLayoutEditMode()">

        <i class="bi bi-bounding-box-circles"></i>

      </button>

      <button
        class="btn btn-sm btn-outline-primary"
        (click)="toggleFullscreen()">

        <i
          class="bi"
          [class.bi-fullscreen]="!isFullscreen"
          [class.bi-fullscreen-exit]="isFullscreen">
        </i>

      </button>

    </div>
  </nav>

  <div id="lobby-stream-video" class="stream-mixer canvas-logo">
    <canvas #canvas id="canvasOne">
      Your browser does not support HTML5 Canvas.
    </canvas>
    <div #stageContainer class="layout-stage" [class.is-editing]="layoutEditMode"></div>
  </div>

</div>
